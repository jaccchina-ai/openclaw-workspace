# T01 龙头战法选股策略 - 配置示例
# 复制此文件为 config.yaml 并填入你的配置

version: "1.3.0"

# API配置
# TUSHARE_TOKEN 从环境变量读取
api:
  api_key: ${TUSHARE_TOKEN}
  endpoint: http://api.tushare.pro
  timeout: 30

# 数据源配置
data_sources:
  tushare:
    enabled: true
    data_source: DC
    token: ${TUSHARE_TOKEN}
  akshare:
    enabled: false

# 策略配置
strategy:
  # 输出配置
  output:
    final_recommendation_count: 3
    include_position: true
    include_reasons: true
    top_n_candidates: 10
  
  # 调度配置
  schedule:
    daily_screening_time: "20:30"
    morning_review_time: "09:25"
    push_time: "09:30"
  
  # 风控配置
  risk_control:
    index_5ma_relation: true
    index_above_5ma_weight: 1.0
    index_below_5ma_weight: 0.7
    max_position_per_stock: 0.2
    min_total_score: 60
  
  # 舆情分析配置
  sentiment_analysis:
    enabled: true
    days_back: 1
    max_news_per_stock: 5
    top_n_for_analysis: 10
  
  # T日评分权重
  t_day_scoring:
    first_limit_time: 30
    seal_amount_ratio: 20
    order_amount_to_circ_mv: 15
    turnover_rate: 5
    turnover_rate_to_20ma: 10
    main_net_amount: 5
    main_net_ratio: 5
    medium_net_amount: 5
    sentiment: 10
    buy_to_sell_ratio: 10
    is_hot_sector: 10
  
  # T+1竞价评分权重
  t1_auction_scoring:
    open_change_pct: 35
    auction_volume_to_t_volume: 25
    auction_volume_ratio: 20
    auction_amount: 20
    auction_turnover_rate: 0

# 评分权重配置
scoring:
  weights:
    limit_up_time: 0.15
    seal_amount_ratio: 0.2
    main_force_net: 0.15
    turnover: 0.1
    volume_ratio: 0.1
    hot_sector: 0.15
    dragon_leader: 0.15

# 数据存储配置
data_storage:
  database:
    type: sqlite
    path: ./data/t01_database.db
    auto_backup: true
    backup_path: ./data/backups/
  tables:
    recommendations: t01_recommendations
    trades: t01_trades
    performance: t01_performance
    factors: t01_factors
    learning_logs: t01_learning_logs
  retention:
    recommendations: 365
    trades: 730
    performance: 1095

# 绩效跟踪配置
performance_tracking:
  success_threshold: 1.03
  buy_time: T+1日09:30
  buy_price: 开盘价
  sell_time: T+2日15:00
  sell_price: 收盘价
  min_trades_for_statistics: 20
  confidence_interval: 0.95
  metrics:
    - win_rate
    - average_return
    - sharpe_ratio
    - max_drawdown
    - profit_factor
  no_selection_warning_threshold: 3

# 通知配置
notification:
  enabled: true
  channels:
    - feishu
  feishu_user_id: ${FEISHU_USER_ID}

# 输出配置
output:
  format: table
  save_to_file: true
  file_path: ./output/results_{date}.csv
  top_n: 10
  alert_thresholds:
    price_change: 5
    volume_spike: 200

# 回测配置
backtest:
  enabled: true
  initial_capital: 1000000
  commission_rate: 0.0003
  slippage: 0.005
  position_size: 0.2
  max_positions: 3
  lookback_days: 252
  report_schedule: weekly
  report_time: 06:00
  alerts:
    backtest_vs_live_deviation: 0.2

# Phase 3 高级功能配置（可选）
phase3:
  enabled: false
  
  # 自适应阈值管理
  adaptive_threshold_manager:
    enabled: true
    base_entry: 70.0
    base_exit: 75.0
    adjustment_step: 2.0
    max_adjustment: 10.0
    regimes:
      bull:
        entry: 65.0
        exit: 70.0
        position_size: 0.25
        stop_loss: 0.05
        take_profit: 0.15
      bear:
        entry: 75.0
        exit: 80.0
        position_size: 0.15
        stop_loss: 0.03
        take_profit: 0.08
      sideways:
        entry: 70.0
        exit: 75.0
        position_size: 0.2
        stop_loss: 0.04
        take_profit: 0.1
  
  # Alpha因子挖掘
  alpha_factor_discovery:
    enabled: true
    max_factors: 50
    min_sharpe: 0.5
    ic_threshold: 0.03
    lookback_days: 252
    discovery_methods:
      - genetic_algorithm
      - neural_network
  
  # 归因分析
  attribution_analyzer:
    enabled: true
    lookback_days: 90
    min_observations: 30
    significance_level: 0.05
    methods:
      - shap_values
      - trade_clustering
      - win_loss_decomposition
      - regime_attribution
  
  # 自动闭环
  auto_closed_loop:
    enabled: true
    check_interval_minutes: 60
    max_iterations_per_day: 10
  
  # 进化触发
  evolution_trigger:
    enabled: true
    scheduled:
      weekly: true
      weekly_day: 0
      monthly: true
      monthly_day: 1
    thresholds:
      win_rate: 40.0
      max_drawdown: 20.0
      profit_factor: 1.0
      ic_value: 0.03
    sudden_change:
      enabled: true
      win_rate_change_threshold: 10.0
      drawdown_change_threshold: 5.0
    multi_condition:
      enabled: true
      min_conditions: 2
      confidence_threshold: 0.7
    rolling_windows:
      short: 20
      long: 60
  
  # 绩效守护
  performance_guardian:
    enabled: true
    check_interval_minutes: 30
    alert_cooldown_minutes: 60
    thresholds:
      win_rate: 40.0
      max_drawdown: 20.0
      ic_value: 0.03
      cpu_percent: 80.0
      memory_percent: 80.0
      disk_percent: 85.0
  
  # 安全部署
  safe_deploy_manager:
    enabled: true
    auto_rollback_on_failure: true
    backup_retention_days: 30
    validation_checks:
      - config_syntax
      - required_keys
      - data_directory
      - logs_directory
    ab_testing:
      enabled: true
      initial_percentage: 20
      ramp_up_steps: [40, 60, 80, 100]
      evaluation_period_days: 5

# 机器学习配置
machine_learning:
  enabled: false
  mode: reinforcement
  min_data_points: 100
  self_evolution:
    enabled: true
    review_interval: 7
    optimization_cycles: 3
  models:
    win_prediction: xgboost
    factor_importance: random_forest
    portfolio_optimization: genetic
  training:
    test_size: 0.2
    cross_validation: 5
    early_stopping: 10
  factor_discovery:
    enabled: true
    max_factors: 50
    correlation_threshold: 0.8
    min_improvement: 0.01

# 系统优化
system_optimization:
  auto_optimize: true
  optimize_frequency: weekly
  optimization_goals:
    - max_win_rate
    - max_sharpe_ratio
    - min_drawdown
  parameter_tuning:
    score_weights: true
    thresholds: true
    risk_parameters: true
  warnings:
    strategy_failure_warning: true
    factor_decay_warning: true
    factor_ic_threshold: 0.03
    no_selection_days_threshold: 3
    system_health_warning: true

# PCA配置
pca:
  enabled: false
  variance_threshold: 0.9
  standardize: true
  test_mode:
    enabled: true
    duration_days: 14
    min_samples: 10
    auto_promote: true
    promote_threshold:
      win_rate_improvement: 0.05
      sharpe_improvement: 0.1
    demote_threshold:
      win_rate_drop: -0.03
      sharpe_drop: -0.05
  monitoring:
    decision_interval_days: 7
    comparison_baseline: pre_pca
    metrics:
      - win_rate
      - sharpe_ratio
      - max_drawdown
      - avg_return

last_updated: '2026-04-02'
