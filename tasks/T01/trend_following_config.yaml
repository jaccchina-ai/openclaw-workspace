# 趋势跟踪型策略配置文件

strategy:
  name: TrendFollowingStrategy
  version: "1.0.0"
  description: "基于移动平均线的趋势跟踪策略"
  author: "T01 System"
  
# 策略参数配置
parameters:
  # 均线周期设置
  ma_short: 5          # 短期均线周期（日）
  ma_medium: 10        # 中期均线周期（日）
  ma_long: 20          # 长期均线周期（日）
  
  # 选股阈值设置
  momentum_threshold: 0.05        # 动量阈值（5%）
  volume_threshold: 1.0           # 成交量倍数（相对于20日均量）
  trend_strength_threshold: 0.3   # 趋势强度阈值

# 评分权重配置
scoring_weights:
  trend_strength: 0.40    # 趋势强度权重
  momentum: 0.30          # 动量得分权重
  volume: 0.20            # 成交量配合权重
  correlation: 0.10       # 大盘相关性权重

# 选股条件配置
selection_criteria:
  # 价格条件
  price_above_ma20: true           # 股价 > MA20
  bullish_alignment: true          # MA5 > MA10 > MA20（多头排列）
  
  # 成交量条件
  volume_above_average: true       # 成交量 > 平均成交量
  
  # 动量条件
  positive_momentum: true          # 动量为正
  
  # 趋势条件
  uptrend_required: true           # 需要处于上升趋势

# 市场环境过滤
market_filter:
  enabled: true                    # 启用大盘过滤
  max_market_decline: -2.0         # 大盘最大跌幅（百分比）
  require_uptrend: false           # 是否要求大盘也处于上升趋势

# 风险控制参数
risk_control:
  max_position_per_stock: 0.10     # 单只股票最大仓位（10%）
  stop_loss_pct: 0.08              # 止损比例（8%）
  take_profit_pct: 0.20            # 止盈比例（20%）

# 运行时配置
runtime:
  min_data_points: 20              # 最小数据点数量
  max_stocks_to_select: 50         # 最大选股数量
  score_threshold: 60              # 最低评分阈值
