# T01 Phase 3 配置扩展

# Alpha因子挖掘配置
alpha_factor_mining:
  enabled: true
  methods:
    genetic_programming: true
    neural_extraction: true
    cross_sectional: true
  genetic_params:
    population_size: 50
    generations: 30
    mutation_rate: 0.1
    crossover_rate: 0.8
    min_ic_threshold: 0.05
  neural_params:
    bottleneck_size: 10
    epochs: 100
    learning_rate: 0.001
    batch_size: 32
  max_new_factors: 10
  discovery_frequency: weekly  # 每周发现新因子

# 深度归因分析配置
attribution_analysis:
  enabled: true
  methods:
    shap_values: true
    trade_clustering: true
    win_loss_decomposition: true
    regime_attribution: true
  shap_params:
    background_samples: 100
    max_evals: 500
  clustering:
    algorithm: kmeans
    n_clusters: 5
    min_cluster_size: 10
  report_frequency: weekly

# 自适应阈值配置
adaptive_thresholds:
  enabled: true
  adjustment_methods:
    volatility_based: true
    regime_based: true
    performance_feedback: true
  volatility_params:
    lookback_days: 20
    high_vol_percentile: 70
    low_vol_percentile: 30
    adjustment_factor: 0.2  # 调整幅度
  regime_params:
    bull_threshold: 1.05    # 牛市阈值乘数
    bear_threshold: 0.95    # 熊市阈值乘数
    sideways_threshold: 1.0 # 震荡市阈值乘数
  performance_feedback:
    lookback_trades: 20
    adjustment_rate: 0.1    # 每次调整幅度
  update_frequency: daily

# 全自动闭环配置
auto_closed_loop:
  enabled: true
  components:
    evolution_trigger: true
    safe_deploy: true
    performance_guardian: true
  trigger_conditions:
    win_rate_drop:
      enabled: true
      threshold: 0.40
      lookback_days: 20
    ic_decay:
      enabled: true
      threshold: 0.03
      min_factors_affected: 3
    drawdown_exceedance:
      enabled: true
      threshold: 0.20
    scheduled:
      enabled: true
      frequency: weekly
      day: friday
      time: "20:00"
  safe_deploy:
    backup_before_deploy: true
    validation_required: true
    rollback_on_failure: true
    ab_testing:
      enabled: true
      initial_percentage: 20
      ramp_up_steps: [40, 60, 80, 100]
      evaluation_period_days: 5
  performance_guardian:
    monitoring_interval_minutes: 30
    alert_channels:
      - feishu
    auto_recovery:
      enabled: true
      max_retries: 3
    health_checks:
      - scheduler_status
      - data_freshness
      - api_connectivity
      - factor_ic_values

# Phase 3 模块版本
phase3_version: 1.4.0
phase3_completion_date: null
