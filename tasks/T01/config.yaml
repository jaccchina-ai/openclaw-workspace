api:
  api_key: 870008d508d2b0e57ecf2ccc586c23c4ecc37522f5e93890fb3d56ab
  endpoint: http://api.tushare.pro
  timeout: 30

# PCA因子正交化配置
pca:
  enabled: false  # 默认关闭，不影响现有功能
  variance_threshold: 0.9  # 方差保留阈值，保留90%的方差信息
  standardize: true  # 是否在PCA前进行标准化
  
  # 测试模式配置
  test_mode:
    enabled: true  # 启用测试模式
    duration_days: 14  # 测试持续14天
    auto_promote: true  # 自动根据结果决定是否开启
    min_samples: 10  # 最少需要10个样本才做决策
    promote_threshold:
      win_rate_improvement: 0.05  # 胜率提升5%则开启
      sharpe_improvement: 0.1  # 夏普比率提升0.1则开启
    demote_threshold:
      win_rate_drop: -0.03  # 胜率下降3%则保持关闭
      sharpe_drop: -0.05  # 夏普比率下降0.05则保持关闭
    
  # 观测指标
  monitoring:
    metrics:
      - win_rate  # 胜率
      - sharpe_ratio  # 夏普比率
      - max_drawdown  # 最大回撤
      - avg_return  # 平均收益
    comparison_baseline: "pre_pca"  # 与PCA前基线对比
    decision_interval_days: 7  # 每7天评估一次
data_sources:
  akshare:
    enabled: false
  tushare:
    data_source: DC
    enabled: true
    token: 870008d508d2b0e57ecf2ccc586c23c4ecc37522f5e93890fb3d56ab
data_storage:
  database:
    auto_backup: true
    backup_path: ./data/backups/
    path: ./data/t01_database.db
    type: sqlite
  retention:
    performance: 1095
    recommendations: 365
    trades: 730
  tables:
    factors: t01_factors
    learning_logs: t01_learning_logs
    performance: t01_performance
    recommendations: t01_recommendations
    trades: t01_trades
last_updated: '2026-02-23'
machine_learning:
  enabled: true
  factor_discovery:
    correlation_threshold: 0.8
    enabled: true
    max_factors: 50
    min_improvement: 0.01
  min_data_points: 100
  mode: reinforcement
  models:
    factor_importance: random_forest
    portfolio_optimization: genetic
    win_prediction: xgboost
  self_evolution:
    enabled: true
    optimization_cycles: 3
    # 进化方案：改为每周反思 (原为30天)
    review_interval: 7
  training:
    cross_validation: 5
    early_stopping: 10
    test_size: 0.2
output:
  alert_thresholds:
    price_change: 5
    volume_spike: 200
  file_path: ./output/results_{date}.csv
  format: table
  save_to_file: true
  top_n: 10
performance_tracking:
  buy_price: 开盘价
  buy_time: T+1日09:30
  confidence_interval: 0.95
  metrics:
  - win_rate
  - average_return
  - sharpe_ratio
  - max_drawdown
  - profit_factor
  min_trades_for_statistics: 20
  sell_price: 收盘价
  sell_time: T+2日15:00
  # 进化方案：成功标准 (T+2收盘/T+1开盘 > 1.03%)
  success_threshold: 1.03
  # 预警机制：连续无选股天数监控
  no_selection_warning_threshold: 3
strategy:
  output:
    final_recommendation_count: 3
    include_position: true
    include_reasons: true
    top_n_candidates: 10
  sentiment_analysis:
    enabled: true  # 启用东方财富舆情分析
    top_n_for_analysis: 10  # 对前10名进行舆情分析
    days_back: 1
    max_news_per_stock: 5
  risk_control:
    index_5ma_relation: true
    index_above_5ma_weight: 1.0
    index_below_5ma_weight: 0.7
    max_position_per_stock: 0.2
    min_total_score: 60
  schedule:
    daily_screening_time: '20:00'
    morning_review_time: 09:25
    push_time: 09:30
  t1_auction_scoring:
    auction_amount: 20
    auction_turnover_rate: 0
    auction_volume_ratio: 20
    auction_volume_to_t_volume: 25
    open_change_pct: 35
  t_day_scoring:
    buy_to_sell_ratio: 10
    first_limit_time: 30
    is_hot_sector: 10
    main_net_amount: 5
    main_net_ratio: 5
    medium_net_amount: 5
    order_amount_to_circ_mv: 15
    turnover_rate: 5
    turnover_rate_to_20ma: 10
    volume_ratio: 5
    sentiment: 10
system_optimization:
  auto_optimize: true
  optimization_goals:
  - max_win_rate
  - max_sharpe_ratio
  - min_drawdown
  optimize_frequency: weekly
  parameter_tuning:
    risk_parameters: true
    score_weights: true
    thresholds: true
  # 进化方案：预警与监控
  warnings:
    # 策略失效预警：连续3天无选股
    strategy_failure_warning: true
    no_selection_days_threshold: 3
    # 因子失效预警：IC值 < 0.03
    factor_decay_warning: true
    factor_ic_threshold: 0.03
    # 系统健康预警
    system_health_warning: true
version: 1.3.0

# 通知配置
notification:
  channels:
    - feishu
  enabled: true
  feishu_user_id: ou_b8a256a9cb526db6c196cb438d6893a6
  # 飞书应用凭证（用于直接API发送，绕过CLI）
  # 请设置环境变量：FEISHU_APP_ID 和 FEISHU_APP_SECRET

# 回测配置
backtest:
  enabled: true  # 启用回测系统
  lookback_days: 252  # 回测历史数据天数，252个交易日约等于1年
  initial_capital: 1000000  # 初始资金100万人民币
  commission_rate: 0.0003  # 手续费率0.03%（万3）
  slippage: 0.005  # 滑点0.5%，模拟实际成交价格偏差
  position_size: 0.2  # 单票仓位20%，控制个股风险
  max_positions: 3  # 最大持仓3只，分散投资
  report_schedule: "weekly"  # 回测报告生成频率：weekly每周
  report_time: "06:00"  # 报告生成时间，北京时间周一早上6点
  alerts:
    backtest_vs_live_deviation: 0.20  # 回测vs实盘收益偏离20%时触发预警
