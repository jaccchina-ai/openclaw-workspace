# 事件驱动型策略配置
# Event Driven Strategy Configuration

strategy:
  name: "EventDrivenStrategy"
  description: "基于事件信号识别和快速响应的事件驱动策略"
  version: "1.0.0"
  author: "T01 System"
  type: "event_driven"
  enabled: true

# 核心参数配置
parameters:
  # 价格跳空阈值（默认2%）
  # 当开盘价相对于昨日收盘价的跳空幅度超过此阈值时触发
  price_gap_threshold: 0.02
  
  # 成交量激增阈值（默认2倍）
  # 当成交量超过前期平均成交量的倍数时触发
  volume_surge_threshold: 2.0
  
  # 波动率阈值（默认1.5倍）
  # 当近期ATR超过前期ATR的倍数时触发
  volatility_threshold: 1.5
  
  # 板块联动阈值（默认0.6）
  # 板块内股票同向变动的相关性阈值
  sector_correlation_threshold: 0.6
  
  # 事件窗口期（默认5天）
  # 用于计算事件强度和持续性
  event_window: 5

# 评分权重配置
score_weights:
  # 事件强度权重（40%）
  # 基于跳空幅度、成交量放大倍数、价格变动计算
  event_strength: 0.40
  
  # 成交量配合权重（30%）
  # 成交量是否配合价格变动
  volume_confirmation: 0.30
  
  # 价格位置权重（20%）
  # 当前价格在近期区间内的位置
  price_position: 0.20
  
  # 持续性预期权重（10%）
  # 基于近期趋势和成交量趋势判断
  sustainability: 0.10

# 选股条件配置
selection_criteria:
  # 最少满足条件数（默认2个）
  # 股票需要至少满足N个条件才会被选中
  min_conditions: 2
  
  # 强制选中条件
  # 满足以下任一条件将直接选中（不受min_conditions限制）
  force_select:
    - gap_and_volume: true  # 跳空+放量
    - breakout: true        # 突破事件
  
  # 数据质量要求
  data_quality:
    min_price_data_points: 10   # 最少价格数据点
    min_volume_data_points: 10  # 最少成交量数据点
    reject_zero_volume: true    # 拒绝零成交量股票

# 事件类型检测配置
event_detection:
  # 高开放量事件
  gap_up_volume:
    enabled: true
    min_gap: 0.02           # 最小跳空幅度
    min_volume_ratio: 2.0   # 最小成交量倍数
  
  # 低开反弹事件
  gap_down_rebound:
    enabled: true
    min_gap: -0.02          # 最小跳空幅度（负值）
    min_volume_ratio: 2.0   # 最小成交量倍数
    rebound_threshold: 0.01 # 反弹阈值（收盘价高于开盘价的幅度）
  
  # 突破事件
  breakout:
    enabled: true
    lookback_period: 20     # 回看周期
    breakout_threshold: 1.02 # 突破阈值（超过前期高点的百分比）
    min_volume_ratio: 2.0   # 最小成交量倍数
  
  # 板块异动
  sector_anomaly:
    enabled: true
    min_anomaly_stocks: 3   # 最少异动股票数
    min_change_pct: 6.0     # 最小涨跌幅（百分比）
    min_volume_ratio: 1.5   # 最小成交量倍数

# 风险控制配置
risk_control:
  # 最大持仓数量
  max_positions: 10
  
  # 单只股票最大权重
  max_single_stock_weight: 0.2
  
  # 最小评分阈值
  min_score_threshold: 60
  
  # 事件冷却期（天）
  # 同一股票在N天内不重复触发
  cooldown_period: 3

# 运行时配置
runtime:
  # 执行超时（毫秒）
  execution_timeout_ms: 5000
  
  # 日志级别
  log_level: "INFO"
  
  # 是否启用调试模式
  debug_mode: false
