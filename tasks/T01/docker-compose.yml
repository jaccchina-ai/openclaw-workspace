version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: t01_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-t01_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-t01_password}
      POSTGRES_DB: ${DB_NAME:-t01_strategy}
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-t01_user} -d ${DB_NAME:-t01_strategy}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - t01_network
    command: >
      postgres
      -c shared_preload_libraries=timescaledb
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=655kB
      -c min_wal_size=1GB
      -c max_wal_size=4GB

  # 可选：pgAdmin 用于数据库管理
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: t01_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@t01.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - t01_network
    depends_on:
      - timescaledb
    profiles:
      - admin

volumes:
  timescale_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  t01_network:
    driver: bridge
